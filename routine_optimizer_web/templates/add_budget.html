{% extends "base.html" %}
{% block content %}
  <h2>Add Budget Entry</h2>
  <form method="post">
    <label>Category (e.g., Food, Transport)</label>
    <input name="category" required>
    <label>Amount</label>
    <input name="amount" type="number" step="0.01" required>
    <label>Note</label>
    <input name="note">
    <button type="submit">Add</button>
  </form>
{% endblock %}
